openapi: 3.0.3
info:
  title: 'TCG Manager API'
  description: 'REST API for TCG Manager — a tournament management platform for Trading Card Game players and organizers. Supports event discovery, creation, and participation across 13 supported games including Pokémon, Yu-Gi-Oh!, Magic: The Gathering, and more.'
  version: 1.0.0
servers:
  - url: 'http://localhost:8000'
tags:
  - name: Authentication
    description: ''
  - name: Profile
    description: ''
  - name: Events
    description: ''
  - name: Participants
    description: ''
  - name: Dashboard
    description: ''
  - name: Players
    description: ''
  - name: Games
    description: ''
  - name: Statistics
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token by calling **POST /api/register** or **POST /api/login**. The token is returned in the `token` field of the response.'
security:
  -
    default: []
paths:
  /api/register:
    post:
      summary: 'Register a new account.'
      operationId: registerANewAccount
      description: 'Creates a new player account and returns a Bearer token you can use immediately.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'User registered successfully'
                  token: eyJ0eXAiOiJKV1QiLCJhbGci...
                properties:
                  message:
                    type: string
                    example: 'User registered successfully'
                  token:
                    type: string
                    example: eyJ0eXAiOiJKV1QiLCJhbGci...
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The email has already been taken.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The email has already been taken.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Your display name. Min 2, max 255 characters.'
                  example: 'Player One'
                email:
                  type: string
                  description: 'A valid, unique email address.'
                  example: test@example.com
                password:
                  type: string
                  description: 'Min 8 characters.'
                  example: yourpassword
                role:
                  type: string
                  description: 'Optional. `player` (default) or `organizer`. Players can join events; organizers can also create, edit and delete their own events.'
                  example: organizer
                password_confirmation:
                  type: string
                  description: 'Must match `password`.'
                  example: yourpassword
              required:
                - name
                - email
                - password
                - password_confirmation
      security: []
  /api/login:
    post:
      summary: 'Log in.'
      operationId: logIn
      description: 'Returns a Bearer token for an existing account.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged in successfully'
                  token: eyJ0eXAiOiJKV1QiLCJhbGci...
                properties:
                  message:
                    type: string
                    example: 'Logged in successfully'
                  token:
                    type: string
                    example: eyJ0eXAiOiJKV1QiLCJhbGci...
        401:
          description: 'Wrong credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid credentials'
                properties:
                  message:
                    type: string
                    example: 'Invalid credentials'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'A valid email address.'
                  example: test@example.com
                password:
                  type: string
                  description: 'Your account password.'
                  example: yourpassword
              required:
                - email
                - password
      security: []
  /api/logout:
    post:
      summary: 'Log out.'
      operationId: logOut
      description: 'Revokes the current Bearer token. The token will no longer work after this call.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged out successfully'
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully'
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/me:
    get:
      summary: 'Get your profile.'
      operationId: getYourProfile
      description: "Returns the authenticated user's own profile, including their favorite game."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Player One'
                  email: test@example.com
                  role: organizer
                  bio: 'Pokémon TCG player since 2010.'
                  country: ES
                  favorite_game:
                    id: 1
                    name: Pokémon
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Player One'
                  email:
                    type: string
                    example: test@example.com
                  role:
                    type: string
                    example: organizer
                  bio:
                    type: string
                    example: 'Pokémon TCG player since 2010.'
                  country:
                    type: string
                    example: ES
                  favorite_game:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Pokémon
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Profile
    put:
      summary: 'Update your profile.'
      operationId: updateYourProfile
      description: "Updates one or more fields on the authenticated user's profile. All fields are optional — only send what you want to change."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: 'Player One'
                  email: test@example.com
                  role: organizer
                  bio: 'Pokémon TCG player since 2010.'
                  country: ES
                  favorite_game:
                    id: 1
                    name: Pokémon
                properties:
                  id:
                    type: integer
                    example: 1
                  name:
                    type: string
                    example: 'Player One'
                  email:
                    type: string
                    example: test@example.com
                  role:
                    type: string
                    example: organizer
                  bio:
                    type: string
                    example: 'Pokémon TCG player since 2010.'
                  country:
                    type: string
                    example: ES
                  favorite_game:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Pokémon
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Your new display name.'
                  example: 'Player One'
                bio:
                  type: string
                  description: 'A short bio shown on your public profile.'
                  example: 'Pokémon TCG player since 2010.'
                  nullable: true
                country:
                  type: string
                  description: 'A 2–10 character country code or name.'
                  example: ES
                  nullable: true
                favorite_game_id:
                  type: integer
                  description: 'The ID of your favourite game (must exist in `/api/games`). Pass `null` to clear it.'
                  example: 1
                  nullable: true
  /api/me/password:
    put:
      summary: 'Update your password.'
      operationId: updateYourPassword
      description: "Changes the authenticated user's password. Requires the current password\nfor confirmation. Existing tokens remain valid after the change."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Password updated successfully'
                properties:
                  message:
                    type: string
                    example: 'Password updated successfully'
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        422:
          description: 'Wrong current password'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The password is incorrect.'
                  errors:
                    current_password:
                      - 'The password is incorrect.'
                properties:
                  message:
                    type: string
                    example: 'The password is incorrect.'
                  errors:
                    type: object
                    properties:
                      current_password:
                        type: array
                        example:
                          - 'The password is incorrect.'
                        items:
                          type: string
      tags:
        - Profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: 'Your current password.'
                  example: yourpassword
                password:
                  type: string
                  description: 'The new password. Min 8 characters, must be different from the current one.'
                  example: new-password-123
                password_confirmation:
                  type: string
                  description: 'Must match `password`.'
                  example: new-password-123
              required:
                - current_password
                - password
                - password_confirmation
  /api/events:
    get:
      summary: 'List events.'
      operationId: listEvents
      description: 'Returns a paginated list of all events (20 per page). Use the query parameters to filter the results.'
      parameters:
        -
          in: query
          name: game
          description: 'Filter by game ID (see `/api/games`).'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by game ID (see `/api/games`).'
            example: 1
        -
          in: query
          name: status
          description: 'Filter by status. Must be one of `upcoming`, `ongoing`, `finished`, `cancelled`.'
          example: upcoming
          required: false
          schema:
            type: string
            description: 'Filter by status. Must be one of `upcoming`, `ongoing`, `finished`, `cancelled`.'
            example: upcoming
        -
          in: query
          name: price
          description: 'Filter by price. Use `free` for free events, `paid` for paid events.'
          example: free
          required: false
          schema:
            type: string
            description: 'Filter by price. Use `free` for free events, `paid` for paid events.'
            example: free
        -
          in: query
          name: date
          description: 'Filter by date (YYYY-MM-DD). Returns events happening on that day.'
          example: '2026-12-01'
          required: false
          schema:
            type: string
            description: 'Filter by date (YYYY-MM-DD). Returns events happening on that day.'
            example: '2026-12-01'
        -
          in: query
          name: search
          description: 'Search by event title (partial match).'
          example: Pokémon
          required: false
          schema:
            type: string
            description: 'Search by event title (partial match).'
            example: Pokémon
        -
          in: query
          name: location
          description: 'Filter by location (partial match).'
          example: Barcelona
          required: false
          schema:
            type: string
            description: 'Filter by location (partial match).'
            example: Barcelona
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      title: 'Pokémon Regional Championship'
                      location: Barcelona
                      entry_fee: 10.0
                      max_players: 32
                      date_time: '2026-12-01 14:00:00'
                      status: upcoming
                      participants_count: 12
                      game:
                        id: 1
                        name: Pokémon
                      creator:
                        id: 2
                        name: 'Player One'
                  links:
                    first: ...
                    last: ...
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    last_page: 1
                    per_page: 20
                    total: 1
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        title: 'Pokémon Regional Championship'
                        location: Barcelona
                        entry_fee: 10
                        max_players: 32
                        date_time: '2026-12-01 14:00:00'
                        status: upcoming
                        participants_count: 12
                        game:
                          id: 1
                          name: Pokémon
                        creator:
                          id: 2
                          name: 'Player One'
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        title:
                          type: string
                          example: 'Pokémon Regional Championship'
                        location:
                          type: string
                          example: Barcelona
                        entry_fee:
                          type: number
                          example: 10.0
                        max_players:
                          type: integer
                          example: 32
                        date_time:
                          type: string
                          example: '2026-12-01 14:00:00'
                        status:
                          type: string
                          example: upcoming
                        participants_count:
                          type: integer
                          example: 12
                        game:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: Pokémon
                        creator:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 2
                            name:
                              type: string
                              example: 'Player One'
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: ...
                      last:
                        type: string
                        example: ...
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 20
                      total:
                        type: integer
                        example: 1
      tags:
        - Events
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                game:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 16
                status:
                  type: string
                  description: ''
                  example: ongoing
                  enum:
                    - upcoming
                    - ongoing
                    - finished
                    - cancelled
                price:
                  type: string
                  description: ''
                  example: free
                  enum:
                    - free
                    - paid
                date:
                  type: string
                  description: 'Must be a valid date.'
                  example: '2026-07-16T20:33:16'
                search:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: 'n'
                location:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: g
      security: []
    post:
      summary: 'Create an event.'
      operationId: createAnEvent
      description: 'Creates a new tournament event. The authenticated user becomes the organizer.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 5
                  title: 'Pokémon Regional Championship'
                  description: 'A competitive tournament open to all trainers.'
                  location: Barcelona
                  entry_fee: 10.0
                  max_players: 32
                  date_time: '2026-12-01 14:00:00'
                  status: upcoming
                  participants_count: 0
                  game:
                    id: 1
                    name: Pokémon
                  creator:
                    id: 1
                    name: 'Player One'
                properties:
                  id:
                    type: integer
                    example: 5
                  title:
                    type: string
                    example: 'Pokémon Regional Championship'
                  description:
                    type: string
                    example: 'A competitive tournament open to all trainers.'
                  location:
                    type: string
                    example: Barcelona
                  entry_fee:
                    type: number
                    example: 10.0
                  max_players:
                    type: integer
                    example: 32
                  date_time:
                    type: string
                    example: '2026-12-01 14:00:00'
                  status:
                    type: string
                    example: upcoming
                  participants_count:
                    type: integer
                    example: 0
                  game:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Pokémon
                  creator:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Player One'
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Player role'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Only organizers can create events.'
                properties:
                  message:
                    type: string
                    example: 'Only organizers can create events.'
        422:
          description: 'Validation error'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The title field is required.'
                  errors:
                    title:
                      - 'The title field is required.'
                properties:
                  message:
                    type: string
                    example: 'The title field is required.'
                  errors:
                    type: object
                    properties:
                      title:
                        type: array
                        example:
                          - 'The title field is required.'
                        items:
                          type: string
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Event name. Max 45 characters.'
                  example: 'Pokémon Regional Championship'
                description:
                  type: string
                  description: 'Full description of the event. Max 2000 characters.'
                  example: 'A competitive tournament open to all trainers.'
                location:
                  type: string
                  description: 'Optional venue name or city. Max 45 characters.'
                  example: Barcelona
                  nullable: true
                date_time:
                  type: string
                  description: 'Event date and time (must be in the future).'
                  example: '2026-12-01 14:00:00'
                max_players:
                  type: integer
                  description: 'Maximum number of participants (2–100).'
                  example: 32
                entry_fee:
                  type: number
                  description: 'Entry fee in EUR. Use 0 for free events. Max 999.99.'
                  example: 10.0
                game_id:
                  type: integer
                  description: 'ID of the game being played (see `/api/games`).'
                  example: 1
              required:
                - title
                - description
                - date_time
                - max_players
                - entry_fee
                - game_id
  '/api/events/{event_id}':
    get:
      summary: 'Get a single event.'
      operationId: getASingleEvent
      description: 'Returns the full details of one event, including its game, creator, and participant count.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  title: 'Pokémon Regional Championship'
                  description: 'A competitive tournament open to all trainers.'
                  location: Barcelona
                  entry_fee: 10.0
                  max_players: 32
                  date_time: '2026-12-01 14:00:00'
                  status: upcoming
                  participants_count: 12
                  game:
                    id: 1
                    name: Pokémon
                  creator:
                    id: 2
                    name: 'Player One'
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: 'Pokémon Regional Championship'
                  description:
                    type: string
                    example: 'A competitive tournament open to all trainers.'
                  location:
                    type: string
                    example: Barcelona
                  entry_fee:
                    type: number
                    example: 10.0
                  max_players:
                    type: integer
                    example: 32
                  date_time:
                    type: string
                    example: '2026-12-01 14:00:00'
                  status:
                    type: string
                    example: upcoming
                  participants_count:
                    type: integer
                    example: 12
                  game:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Pokémon
                  creator:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      name:
                        type: string
                        example: 'Player One'
        404:
          description: 'Event not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Resource not found.'
                properties:
                  message:
                    type: string
                    example: 'Resource not found.'
      tags:
        - Events
      security: []
    put:
      summary: 'Update an event.'
      operationId: updateAnEvent
      description: 'Updates an existing event. Only the organizer (creator) of the event can do this.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  title: 'Pokémon Regional Championship'
                  description: 'Updated description.'
                  location: Madrid
                  entry_fee: 15.0
                  max_players: 64
                  date_time: '2026-12-01 14:00:00'
                  status: upcoming
                  participants_count: 0
                  game:
                    id: 1
                    name: Pokémon
                  creator:
                    id: 1
                    name: 'Player One'
                properties:
                  id:
                    type: integer
                    example: 1
                  title:
                    type: string
                    example: 'Pokémon Regional Championship'
                  description:
                    type: string
                    example: 'Updated description.'
                  location:
                    type: string
                    example: Madrid
                  entry_fee:
                    type: number
                    example: 15.0
                  max_players:
                    type: integer
                    example: 64
                  date_time:
                    type: string
                    example: '2026-12-01 14:00:00'
                  status:
                    type: string
                    example: upcoming
                  participants_count:
                    type: integer
                    example: 0
                  game:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: Pokémon
                  creator:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Player One'
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
        403:
          description: 'Not the organizer'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This action is unauthorized.'
                properties:
                  message:
                    type: string
                    example: 'This action is unauthorized.'
        404:
          description: 'Event not found'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Resource not found.'
                properties:
                  message:
                    type: string
                    example: 'Resource not found.'
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Event name. Max 45 characters.'
                  example: 'Pokémon Regional Championship'
                description:
                  type: string
                  description: 'Full description of the event. Max 2000 characters.'
                  example: 'A competitive tournament open to all trainers.'
                location:
                  type: string
                  description: 'Optional venue name or city. Max 45 characters.'
                  example: Barcelona
                  nullable: true
                date_time:
                  type: string
                  description: 'Event date and time (must be in the future).'
                  example: '2026-12-01 14:00:00'
                max_players:
                  type: integer
                  description: 'Maximum number of participants (2–100).'
                  example: 32
                entry_fee:
                  type: number
                  description: 'Entry fee in EUR. Use 0 for free events. Max 999.99.'
                  example: 10.0
                game_id:
                  type: integer
                  description: 'ID of the game being played (see `/api/games`).'
                  example: 1
              required:
                - title
                - description
                - date_time
                - max_players
                - entry_fee
                - game_id
    delete:
      summary: 'Delete an event.'
      operationId: deleteAnEvent
      description: 'Permanently deletes an event. Only the organizer (creator) of the event can do this.'
      parameters: []
      responses:
        204:
          description: 'Deleted successfully'
          content:
            application/json:
              schema:
                type: object
                example: {}
                properties: {}
        401:
